<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>L'AURIA | Create Account</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .auth-page {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 80vh;
            background: var(--bg-alt);
            padding: 40px 20px;
        }

        .auth-card {
            background: var(--bg-main);
            padding: 50px 40px;
            width: 100%;
            max-width: 450px;
            box-shadow: var(--shadow-sm);
            border-top: 4px solid var(--gold-accent);
            text-align: center;
        }

        .auth-title {
            font-size: 24px;
            margin-bottom: 5px;
            color: var(--text-primary);
        }

        .auth-subtitle {
            font-size: 13px;
            color: var(--text-secondary);
            margin-bottom: 30px;
        }

        .auth-footer {
            margin-top: 30px;
            font-size: 14px;
            color: var(--text-secondary);
        }

        .auth-footer a {
            color: var(--gold-accent);
            font-weight: 500;
            text-decoration: underline;
        }
    </style>
</head>

<body>

    <!-- Main Header -->
    <header class="header">
        <div class="container navbar-container">
            <nav class="nav-links">
                <a href="shop.html?category=jewellery">Jewellery</a>
                <a href="shop.html?category=clothing">Featured</a>
                <a href="shop.html">New Arrivals</a>
            </nav>

            <a href="index.html" class="brand-logo">L'AURIA</a>

            <div class="nav-icons">
                <a href="cart.html"><i class="fas fa-shopping-bag"></i></a>
            </div>
        </div>
    </header>

    <div class="auth-page">
        <div class="auth-card">
            <h1 class="auth-title">Create Account</h1>
            <p class="auth-subtitle">Join us to checkout faster and track your orders.</p>

            <form id="registerForm">
                <div class="form-group text-left">
                    <input type="text" id="name" class="form-input" placeholder="Full Name" required>
                </div>
                <div class="form-group text-left">
                    <input type="email" id="email" class="form-input" placeholder="Email Address" required>
                </div>
                <div class="form-group text-left">
                    <input type="password" id="password" class="form-input" placeholder="Password" required minlength="8">
                    <div id="passwordStrength" style="margin-top:8px; font-size:12px;"></div>
                    <ul id="passwordReqs" style="font-size:11px; color:#999; margin:8px 0 0 16px; list-style:disc; text-align:left;">
                        <li id="req-length">At least 8 characters</li>
                        <li id="req-upper">One uppercase letter</li>
                        <li id="req-lower">One lowercase letter</li>
                        <li id="req-number">One number</li>
                        <li id="req-special">One special character (!@#$%^&*...)</li>
                    </ul>
                </div>

                <button type="submit" class="btn btn-primary" style="width: 100%; padding: 15px; margin-top: 10px;">
                    Create Account
                </button>
            </form>

            <div class="auth-footer">
                Already have an account? <a href="login.html">Login</a>
            </div>
        </div>
    </div>

    <script src="js/main.js"></script>
    <script>
        // Password strength indicator
        const passwordInput = document.getElementById('password');
        const strengthDiv = document.getElementById('passwordStrength');

        const checks = {
            length: { el: document.getElementById('req-length'), test: p => p.length >= 8 },
            upper: { el: document.getElementById('req-upper'), test: p => /[A-Z]/.test(p) },
            lower: { el: document.getElementById('req-lower'), test: p => /[a-z]/.test(p) },
            number: { el: document.getElementById('req-number'), test: p => /[0-9]/.test(p) },
            special: { el: document.getElementById('req-special'), test: p => /[!@#$%^&*(),.?":{}|<>]/.test(p) },
        };

        passwordInput.addEventListener('input', () => {
            const p = passwordInput.value;
            let passed = 0;
            for (const key in checks) {
                const ok = checks[key].test(p);
                checks[key].el.style.color = ok ? '#2ecc71' : '#999';
                if (ok) passed++;
            }
            if (p.length === 0) {
                strengthDiv.innerHTML = '';
            } else if (passed <= 2) {
                strengthDiv.innerHTML = '<span style="color:#e74c3c;">● Weak</span>';
            } else if (passed <= 4) {
                strengthDiv.innerHTML = '<span style="color:#f39c12;">● Medium</span>';
            } else {
                strengthDiv.innerHTML = '<span style="color:#2ecc71;">● Strong</span>';
            }
        });

        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const password = document.getElementById('password').value;
            // Client-side validation
            let allPassed = true;
            for (const key in checks) {
                if (!checks[key].test(password)) { allPassed = false; break; }
            }
            if (!allPassed) {
                alert('Please ensure your password meets all requirements.');
                return;
            }

            try {
                const res = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        name: document.getElementById('name').value,
                        email: document.getElementById('email').value,
                        password: password
                    })
                });

                const data = await res.json();
                if (res.ok) {
                    localStorage.setItem('luxury_user', JSON.stringify(data));
                    window.location.href = 'dashboard.html';
                } else {
                    alert(data.message || 'Registration failed');
                }
            } catch (err) {
                console.error(err);
            }
        });
    </script>
</body>

</html>
