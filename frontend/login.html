<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ourgia | Customer Login</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .auth-page {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 80vh;
            background: var(--bg-alt);
            padding: 40px 20px;
        }

        .auth-card {
            background: var(--bg-main);
            padding: 50px 40px;
            width: 100%;
            max-width: 450px;
            box-shadow: var(--shadow-sm);
            border-top: 4px solid var(--gold-accent);
            text-align: center;
        }

        .auth-title {
            font-size: 24px;
            margin-bottom: 5px;
            color: var(--text-primary);
        }

        .auth-subtitle {
            font-size: 13px;
            color: var(--text-secondary);
            margin-bottom: 30px;
        }

        .auth-footer {
            margin-top: 30px;
            font-size: 14px;
            color: var(--text-secondary);
        }

        .auth-footer a {
            color: var(--gold-accent);
            font-weight: 500;
            text-decoration: underline;
        }
    </style>
</head>

<body>

    <!-- Main Header -->
    <header class="header">
        <div class="container navbar-container">
            <nav class="nav-links">
                <a href="shop.html?category=jewellery">Jewellery</a>
                <a href="shop.html?category=clothing">Featured</a>
                <a href="shop.html">New Arrivals</a>
            </nav>

            <a href="index.html" class="brand-logo">Ourgia</a>

            <div class="nav-icons">
                <a href="cart.html"><i class="fas fa-shopping-bag"></i></a>
            </div>
        </div>
    </header>

    <div class="auth-page">
        <div class="auth-card">
            <h1 class="auth-title">Welcome Back</h1>
            <p class="auth-subtitle">Sign in to access your orders and saved items.</p>

            <form id="loginForm">
                <div class="form-group text-left">
                    <input type="email" id="email" class="form-input" placeholder="Email Address" required>
                </div>
                <div class="form-group text-left">
                    <input type="password" id="password" class="form-input" placeholder="Password" required>
                </div>

                <button type="submit" class="btn btn-primary" style="width: 100%; padding: 15px; margin-top: 10px;">
                    Login
                </button>
            </form>

            <div class="auth-footer">
                Don't have an account? <a href="register.html">Sign Up</a>
            </div>
        </div>
    </div>

    <script src="js/main.js"></script>
    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        email: document.getElementById('email').value,
                        password: document.getElementById('password').value
                    })
                });

                const data = await res.json();
                if (res.ok) {
                    localStorage.setItem('luxury_user', JSON.stringify(data));
                    window.location.href = data.role === 'admin' ? '/admin' : 'dashboard.html';
                } else {
                    alert(data.message || 'Login failed');
                }
            } catch (err) {
                console.error(err);
            }
        });
    </script>
</body>

</html>
