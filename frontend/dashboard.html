<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ourgia | My Account</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .dashboard-page {
            padding: 60px 0;
            min-height: 80vh;
        }

        .dashboard-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            padding-bottom: 20px;
            margin-bottom: 40px;
            border-bottom: 2px solid var(--border-color);
        }

        .dashboard-header h1 {
            font-size: 28px;
        }

        .greeting {
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: 5px;
        }

        .order-card {
            background: var(--bg-main);
            border: 1px solid var(--border-color);
            border-radius: 4px;
            margin-bottom: 30px;
            overflow: hidden;
        }

        .order-header {
            background: var(--bg-alt);
            padding: 15px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
        }

        .order-header-info {
            display: flex;
            gap: 40px;
        }

        .order-meta-label {
            font-size: 11px;
            text-transform: uppercase;
            color: var(--text-secondary);
            letter-spacing: 1px;
            margin-bottom: 4px;
        }

        .order-meta-value {
            font-size: 14px;
            font-weight: 500;
            color: var(--text-primary);
        }

        .order-id {
            font-size: 14px;
            color: var(--text-secondary);
        }

        .status-badge {
            display: inline-block;
            padding: 6px 12px;
            font-size: 12px;
            font-weight: 600;
            border-radius: 20px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .status-processing {
            background: #fff3cd;
            color: #856404;
        }

        .status-shipped {
            background: #d1ecf1;
            color: #0c5460;
        }

        .status-delivered {
            background: #d4edda;
            color: #155724;
        }

        .order-body {
            padding: 25px;
        }

        .order-item {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
            padding-bottom: 20px;
            border-bottom: 1px dashed var(--border-color);
        }

        .order-item:last-child {
            margin-bottom: 0;
            padding-bottom: 0;
            border-bottom: none;
        }

        .item-img {
            width: 80px;
            height: 100px;
            object-fit: cover;
            background: var(--bg-alt);
            border: 1px solid var(--border-color);
        }

        .item-details h4 {
            font-family: var(--font-sans);
            font-size: 15px;
            margin-bottom: 5px;
        }

        .item-details p {
            font-size: 13px;
            color: var(--text-secondary);
        }

        .item-price-wrapper {
            margin-top: 10px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .empty-state {
            text-align: center;
            padding: 60px 0;
            background: var(--bg-alt);
            border-radius: 4px;
        }

        .empty-state i {
            font-size: 50px;
            color: var(--border-color);
            margin-bottom: 20px;
        }

        @media (max-width: 768px) {
            .order-header {
                flex-direction: column;
                align-items: flex-start;
                gap: 15px;
            }

            .order-header-info {
                flex-direction: column;
                gap: 15px;
            }

            .dashboard-header {
                flex-direction: column;
                align-items: flex-start;
                gap: 15px;
            }
        }
    </style>
</head>

<body>

    <!-- Main Header -->
    <header class="header">
        <div class="container navbar-container">
            <nav class="nav-links">
                <a href="shop.html?category=jewellery">Jewellery</a>
                <a href="shop.html?category=clothing">Featured</a>
                <a href="shop.html">New Arrivals</a>
            </nav>

            <a href="index.html" class="brand-logo">Ourgia</a>

            <div class="nav-icons">
                <a href="cart.html"><i class="fas fa-shopping-bag"></i></a>
            </div>
        </div>
    </header>

    <div class="container dashboard-page">
        <div class="dashboard-header">
            <div>
                <div class="greeting" id="greetingText">Welcome back,</div>
                <h1>Your Orders</h1>
            </div>
            <div>
                <button class="btn btn-outline" onclick="logout()">Sign Out</button>
            </div>
        </div>

        <div id="ordersContainer">
            <div class="empty-state">
                <p>Loading your order history...</p>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer>
        <div class="container">
            <div class="footer-bottom">
                &copy; 2026 Ourgia India. All rights reserved.
            </div>
        </div>
    </footer>

    <script src="js/main.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            if (!currentUser) {
                window.location.href = 'login.html';
                return;
            }

            document.getElementById('greetingText').innerText = `Welcome back, ${currentUser.name}`;

            try {
                const res = await fetch('/api/orders/myorders', {
                    headers: { 'Authorization': `Bearer ${currentUser.token}` }
                });
                const orders = await res.json();
                const container = document.getElementById('ordersContainer');

                if (orders.length === 0) {
                    container.innerHTML = `
            <div class="empty-state">
              <i class="fas fa-box-open"></i>
              <h3>No orders yet</h3>
              <p style="color: var(--text-secondary); margin: 15px 0 25px;">You haven't placed any orders with us. Let's change that!</p>
              <a href="shop.html" class="btn btn-primary">Start Shopping</a>
            </div>
          `;
                    return;
                }

                let html = '';
                orders.forEach((order) => {
                    const date = new Date(order.createdAt).toLocaleDateString('en-IN', { year: 'numeric', month: 'long', day: 'numeric' });
                    const itemsHtml = order.items.map(item => `
            <div class="order-item">
              <img src="${item.image}" alt="${item.name}" class="item-img">
              <div class="item-details">
                <h4>${item.name}</h4>
                <p>Size: ${item.size || 'Standard'} | Quantity: ${item.quantity}</p>
                <div class="item-price-wrapper">Rs. ${item.price.toLocaleString()}</div>
              </div>
            </div>
          `).join('');

                    html += `
            <div class="order-card">
              <div class="order-header">
                <div class="order-header-info">
                  <div>
                    <div class="order-meta-label">Order Placed</div>
                    <div class="order-meta-value">${date}</div>
                  </div>
                  <div>
                    <div class="order-meta-label">Total Amount</div>
                    <div class="order-meta-value">Rs. ${order.totalAmount.toLocaleString()}</div>
                  </div>
                  <div>
                    <div class="order-meta-label">Ship To</div>
                    <div class="order-meta-value">${currentUser.name}</div>
                  </div>
                </div>
                <div style="text-align: right;">
                  <div class="order-id" style="margin-bottom: 10px;">ORDER # ${order._id.substring(order._id.length - 10).toUpperCase()}</div>
                  <div class="status-badge status-${order.orderStatus.toLowerCase()}">${order.orderStatus}</div>
                </div>
              </div>
              <div class="order-body">
                ${itemsHtml}
              </div>
            </div>
          `;
                });
                container.innerHTML = html;

            } catch (err) {
                console.error(err);
                document.getElementById('ordersContainer').innerHTML = '<div class="empty-state"><p>Error loading order history. Please refresh the page.</p></div>';
            }
        });

        function logout() {
            localStorage.removeItem('luxury_user');
            window.location.href = 'index.html';
        }
    </script>
</body>

</html>
